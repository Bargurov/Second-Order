services:
  - type: web
    name: second-order-api
    runtime: python
    plan: starter
    buildCommand: python -m pip install -r requirements.txt
    startCommand: python -m uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      # Comma-separated list of origins allowed to call the API.
      # Leave blank for a same-origin deploy where the frontend is
      # served from the same host (e.g. via a Render static site
      # with a rewrite rule that forwards /api/* to this service).
      # Set to the deployed frontend origin(s) for split deploys.
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      # Anthropic key — required for live analysis, optional locally.
      - key: ANTHROPIC_API_KEY
        sync: false
